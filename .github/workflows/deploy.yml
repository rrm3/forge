name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DEV_MODE: "true"
        run: python -m pytest tests/ -q

  deploy-backend:
    name: Deploy Backend
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::8}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --provenance=false -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Update REST Lambda function
        env:
          FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
        run: |
          VERSION=$(aws lambda update-function-code \
            --function-name "${FUNCTION_NAME}" \
            --image-uri "${{ steps.build.outputs.image_uri }}" \
            --publish \
            --query 'Version' --output text)

          aws lambda wait function-updated \
            --function-name "${FUNCTION_NAME}"

          echo "Published version: ${VERSION}"

          # Point 'live' alias to new version (provisioned concurrency follows the alias)
          aws lambda update-alias \
            --function-name "${FUNCTION_NAME}" \
            --name live \
            --function-version "${VERSION}" || \
          aws lambda create-alias \
            --function-name "${FUNCTION_NAME}" \
            --name live \
            --function-version "${VERSION}"

          # Wait for provisioned concurrency to initialize on the new version
          sleep 5  # Allow status to transition from old-version READY to IN_PROGRESS
          PROV_CHECK=$(aws lambda get-provisioned-concurrency-config \
            --function-name "${FUNCTION_NAME}" --qualifier live \
            --query 'Status' --output text 2>/dev/null || echo "NONE")
          if [ "$PROV_CHECK" != "NONE" ]; then
            echo "Waiting for provisioned concurrency on ${FUNCTION_NAME}..."
            for i in $(seq 1 60); do
              STATUS=$(aws lambda get-provisioned-concurrency-config \
                --function-name "${FUNCTION_NAME}" --qualifier live \
                --query 'Status' --output text 2>/dev/null)
              if [ "$STATUS" = "READY" ]; then
                ALLOC=$(aws lambda get-provisioned-concurrency-config \
                  --function-name "${FUNCTION_NAME}" --qualifier live \
                  --query 'AllocatedProvisionedConcurrentExecutions' --output text)
                echo "Provisioned concurrency ready (${ALLOC} warm instances)"
                break
              fi
              [ "$STATUS" = "FAILED" ] && echo "WARNING: Provisioned concurrency failed" && break
              echo "  Status: ${STATUS} (${i}/60)"
              sleep 5
            done
          fi

      - name: Update WebSocket Lambda function
        env:
          WS_FUNCTION_NAME: ${{ secrets.WS_LAMBDA_FUNCTION_NAME }}
        run: |
          if [ -z "${WS_FUNCTION_NAME}" ]; then
            echo "WS_LAMBDA_FUNCTION_NAME secret not set — skipping WS Lambda deploy"
            exit 0
          fi
          VERSION=$(aws lambda update-function-code \
            --function-name "${WS_FUNCTION_NAME}" \
            --image-uri "${{ steps.build.outputs.image_uri }}" \
            --publish \
            --query 'Version' --output text)

          aws lambda wait function-updated \
            --function-name "${WS_FUNCTION_NAME}"

          echo "Published version: ${VERSION}"

          # Point 'live' alias to new version (provisioned concurrency follows the alias)
          aws lambda update-alias \
            --function-name "${WS_FUNCTION_NAME}" \
            --name live \
            --function-version "${VERSION}" || \
          aws lambda create-alias \
            --function-name "${WS_FUNCTION_NAME}" \
            --name live \
            --function-version "${VERSION}"

          # Wait for provisioned concurrency to initialize on the new version
          sleep 5  # Allow status to transition from old-version READY to IN_PROGRESS
          PROV_CHECK=$(aws lambda get-provisioned-concurrency-config \
            --function-name "${WS_FUNCTION_NAME}" --qualifier live \
            --query 'Status' --output text 2>/dev/null || echo "NONE")
          if [ "$PROV_CHECK" != "NONE" ]; then
            echo "Waiting for provisioned concurrency on ${WS_FUNCTION_NAME}..."
            for i in $(seq 1 60); do
              STATUS=$(aws lambda get-provisioned-concurrency-config \
                --function-name "${WS_FUNCTION_NAME}" --qualifier live \
                --query 'Status' --output text 2>/dev/null)
              if [ "$STATUS" = "READY" ]; then
                ALLOC=$(aws lambda get-provisioned-concurrency-config \
                  --function-name "${WS_FUNCTION_NAME}" --qualifier live \
                  --query 'AllocatedProvisionedConcurrentExecutions' --output text)
                echo "Provisioned concurrency ready (${ALLOC} warm instances)"
                break
              fi
              [ "$STATUS" = "FAILED" ] && echo "WARNING: Provisioned concurrency failed" && break
              echo "  Status: ${STATUS} (${i}/60)"
              sleep 5
            done
          fi

  deploy-frontend:
    name: Deploy Frontend
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        working-directory: frontend
        env:
          VITE_OIDC_PROVIDER_URL: ${{ secrets.OIDC_PROVIDER_URL }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
          VITE_API_URL: ""
          VITE_WS_URL: ${{ secrets.WS_API_URL }}
        run: |
          npm ci
          npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ "s3://${{ secrets.FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "silent-callback.html"

          aws s3 cp frontend/dist/index.html "s3://${{ secrets.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache"

          aws s3 cp frontend/dist/silent-callback.html "s3://${{ secrets.FRONTEND_BUCKET }}/silent-callback.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
