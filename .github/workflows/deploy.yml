name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DEV_MODE: "true"
        run: python -m pytest tests/ -q

  deploy-backend:
    name: Deploy Backend
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::8}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --provenance=false -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Update REST Lambda function
        env:
          FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
        run: |
          VERSION=$(aws lambda update-function-code \
            --function-name "${FUNCTION_NAME}" \
            --image-uri "${{ steps.build.outputs.image_uri }}" \
            --publish \
            --query 'Version' --output text)

          aws lambda wait function-updated \
            --function-name "${FUNCTION_NAME}"

          echo "Published version: ${VERSION}"

          # Zero-downtime deploy: warm the new version BEFORE swinging the alias.
          # Fail closed: do NOT swing the alias unless pre-warm succeeds.
          PC_COUNT=$(aws lambda get-provisioned-concurrency-config \
            --function-name "${FUNCTION_NAME}" --qualifier live \
            --query 'RequestedProvisionedConcurrentExecutions' --output text 2>/dev/null || echo "0")
          PREWARM_OK="false"

          if [ "$PC_COUNT" != "0" ] && [ "$PC_COUNT" != "None" ]; then
            echo "Pre-warming version ${VERSION} with ${PC_COUNT} provisioned instances..."
            aws lambda put-provisioned-concurrency-config \
              --function-name "${FUNCTION_NAME}" \
              --qualifier "${VERSION}" \
              --provisioned-concurrent-executions "${PC_COUNT}"

            for i in $(seq 1 60); do
              PC_JSON=$(aws lambda get-provisioned-concurrency-config \
                --function-name "${FUNCTION_NAME}" --qualifier "${VERSION}" \
                --output json 2>/dev/null || echo '{}')
              STATUS=$(echo "$PC_JSON" | jq -r '.Status // "UNKNOWN"')
              REASON=$(echo "$PC_JSON" | jq -r '.StatusReason // ""')
              if [ "$STATUS" = "READY" ]; then
                echo "Version ${VERSION} warm (${PC_COUNT} instances ready)"
                PREWARM_OK="true"
                break
              fi
              if [ "$STATUS" = "FAILED" ]; then
                echo "ERROR: Pre-warm FAILED: ${REASON}"
                aws lambda delete-provisioned-concurrency-config \
                  --function-name "${FUNCTION_NAME}" --qualifier "${VERSION}" 2>/dev/null || true
                break
              fi
              echo "  Pre-warming: ${STATUS} (${i}/60)"
              sleep 5
            done
            if [ "$PREWARM_OK" = "false" ] && [ "$STATUS" != "FAILED" ]; then
              echo "ERROR: Pre-warm timed out (last status: ${STATUS})"
              aws lambda delete-provisioned-concurrency-config \
                --function-name "${FUNCTION_NAME}" --qualifier "${VERSION}" 2>/dev/null || true
            fi
          else
            PREWARM_OK="true"  # No PC configured, nothing to pre-warm
          fi

          if [ "$PREWARM_OK" = "false" ]; then
            echo "::error::Pre-warm failed for ${FUNCTION_NAME} v${VERSION}. Alias NOT swung. Aborting."
            exit 1
          fi

          # AWS doesn't allow an alias with PC to point to a version that also has PC.
          # Delete version-level PC right before swinging the alias. The warm execution
          # environments persist briefly, so the alias PC reuses them.
          if [ "$PC_COUNT" != "0" ] && [ "$PC_COUNT" != "None" ]; then
            echo "Removing version-level PC before alias swing..."
            aws lambda delete-provisioned-concurrency-config \
              --function-name "${FUNCTION_NAME}" --qualifier "${VERSION}" 2>/dev/null || true
          fi

          # Swing alias to the pre-warmed version
          aws lambda update-alias \
            --function-name "${FUNCTION_NAME}" \
            --name live \
            --function-version "${VERSION}" || \
          aws lambda create-alias \
            --function-name "${FUNCTION_NAME}" \
            --name live \
            --function-version "${VERSION}"

          # Record deployed version in SSM so CDK resolves the correct version
          aws ssm put-parameter \
            --name "/forge/live-versions/${FUNCTION_NAME}" \
            --value "${VERSION}" --type String --overwrite

          # Wait for alias-level provisioned concurrency to be ready on the new version
          if [ "$PC_COUNT" != "0" ] && [ "$PC_COUNT" != "None" ]; then
            echo "Waiting for alias PC to initialize on version ${VERSION}..."
            for i in $(seq 1 60); do
              STATUS=$(aws lambda get-provisioned-concurrency-config \
                --function-name "${FUNCTION_NAME}" --qualifier live \
                --query 'Status' --output text 2>/dev/null || echo "UNKNOWN")
              if [ "$STATUS" = "READY" ]; then
                echo "Alias provisioned concurrency ready"
                break
              fi
              [ "$STATUS" = "FAILED" ] && echo "WARNING: Alias provisioned concurrency failed" && break
              echo "  Alias PC: ${STATUS} (${i}/60)"
              sleep 5
            done
          fi

      - name: Update WebSocket Lambda function
        env:
          WS_FUNCTION_NAME: ${{ secrets.WS_LAMBDA_FUNCTION_NAME }}
        run: |
          if [ -z "${WS_FUNCTION_NAME}" ]; then
            echo "WS_LAMBDA_FUNCTION_NAME secret not set — skipping WS Lambda deploy"
            exit 0
          fi
          VERSION=$(aws lambda update-function-code \
            --function-name "${WS_FUNCTION_NAME}" \
            --image-uri "${{ steps.build.outputs.image_uri }}" \
            --publish \
            --query 'Version' --output text)

          aws lambda wait function-updated \
            --function-name "${WS_FUNCTION_NAME}"

          echo "Published version: ${VERSION}"

          # Zero-downtime deploy: warm the new version BEFORE swinging the alias.
          # Fail closed: do NOT swing the alias unless pre-warm succeeds.
          PC_COUNT=$(aws lambda get-provisioned-concurrency-config \
            --function-name "${WS_FUNCTION_NAME}" --qualifier live \
            --query 'RequestedProvisionedConcurrentExecutions' --output text 2>/dev/null || echo "0")
          PREWARM_OK="false"

          if [ "$PC_COUNT" != "0" ] && [ "$PC_COUNT" != "None" ]; then
            echo "Pre-warming version ${VERSION} with ${PC_COUNT} provisioned instances..."
            aws lambda put-provisioned-concurrency-config \
              --function-name "${WS_FUNCTION_NAME}" \
              --qualifier "${VERSION}" \
              --provisioned-concurrent-executions "${PC_COUNT}"

            for i in $(seq 1 60); do
              PC_JSON=$(aws lambda get-provisioned-concurrency-config \
                --function-name "${WS_FUNCTION_NAME}" --qualifier "${VERSION}" \
                --output json 2>/dev/null || echo '{}')
              STATUS=$(echo "$PC_JSON" | jq -r '.Status // "UNKNOWN"')
              REASON=$(echo "$PC_JSON" | jq -r '.StatusReason // ""')
              if [ "$STATUS" = "READY" ]; then
                echo "Version ${VERSION} warm (${PC_COUNT} instances ready)"
                PREWARM_OK="true"
                break
              fi
              if [ "$STATUS" = "FAILED" ]; then
                echo "ERROR: Pre-warm FAILED: ${REASON}"
                aws lambda delete-provisioned-concurrency-config \
                  --function-name "${WS_FUNCTION_NAME}" --qualifier "${VERSION}" 2>/dev/null || true
                break
              fi
              echo "  Pre-warming: ${STATUS} (${i}/60)"
              sleep 5
            done
            if [ "$PREWARM_OK" = "false" ] && [ "$STATUS" != "FAILED" ]; then
              echo "ERROR: Pre-warm timed out (last status: ${STATUS})"
              aws lambda delete-provisioned-concurrency-config \
                --function-name "${WS_FUNCTION_NAME}" --qualifier "${VERSION}" 2>/dev/null || true
            fi
          else
            PREWARM_OK="true"  # No PC configured, nothing to pre-warm
          fi

          if [ "$PREWARM_OK" = "false" ]; then
            echo "::error::Pre-warm failed for ${WS_FUNCTION_NAME} v${VERSION}. Alias NOT swung. Aborting."
            exit 1
          fi

          # AWS doesn't allow an alias with PC to point to a version that also has PC.
          # Delete version-level PC right before swinging the alias.
          if [ "$PC_COUNT" != "0" ] && [ "$PC_COUNT" != "None" ]; then
            echo "Removing version-level PC before alias swing..."
            aws lambda delete-provisioned-concurrency-config \
              --function-name "${WS_FUNCTION_NAME}" --qualifier "${VERSION}" 2>/dev/null || true
          fi

          # Swing alias to the pre-warmed version
          aws lambda update-alias \
            --function-name "${WS_FUNCTION_NAME}" \
            --name live \
            --function-version "${VERSION}" || \
          aws lambda create-alias \
            --function-name "${WS_FUNCTION_NAME}" \
            --name live \
            --function-version "${VERSION}"

          # Record deployed version in SSM so CDK resolves the correct version
          aws ssm put-parameter \
            --name "/forge/live-versions/${WS_FUNCTION_NAME}" \
            --value "${VERSION}" --type String --overwrite

          # Wait for alias-level provisioned concurrency to be ready on the new version
          if [ "$PC_COUNT" != "0" ] && [ "$PC_COUNT" != "None" ]; then
            echo "Waiting for alias PC to initialize on version ${VERSION}..."
            for i in $(seq 1 60); do
              STATUS=$(aws lambda get-provisioned-concurrency-config \
                --function-name "${WS_FUNCTION_NAME}" --qualifier live \
                --query 'Status' --output text 2>/dev/null || echo "UNKNOWN")
              if [ "$STATUS" = "READY" ]; then
                echo "Alias provisioned concurrency ready"
                break
              fi
              [ "$STATUS" = "FAILED" ] && echo "WARNING: Alias provisioned concurrency failed" && break
              echo "  Alias PC: ${STATUS} (${i}/60)"
              sleep 5
            done
          fi

  deploy-frontend:
    name: Deploy Frontend
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        working-directory: frontend
        env:
          VITE_OIDC_PROVIDER_URL: ${{ secrets.OIDC_PROVIDER_URL }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
          VITE_API_URL: ""
          VITE_WS_URL: ${{ secrets.WS_API_URL }}
        run: |
          npm ci
          npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ "s3://${{ secrets.FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html "s3://${{ secrets.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
